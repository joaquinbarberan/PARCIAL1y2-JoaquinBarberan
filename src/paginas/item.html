<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del item</title>
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
    <nav class="menu">
        <span class="menu-marca">Gestión de Alumnos</span>
        <div class="menu-enlaces">
            <a href="/items">Items</a>
            <a href="/procedimiento">Procedimiento</a>
            <a href="/cerrar-sesion" class="menu-salir">Cerrar sesión</a>
        </div>
    </nav>

    <main class="contenedor">
        <h1>Detalle del alumno</h1>
        <p class="subtitulo">
            Consulta del endpoint <code>/alumnos/:id</code> preparado para recibir el parámetro.
        </p>

        <a class="enlace" href="/items">← Volver al listado</a>

        <div id="contenedor-item">
            <p>Cargando alumno…</p>
        </div>
    </main>

    <footer class="pie">
        <p>Aplicaciones Web 2 — Parcial 2 — Joaquín Barberán</p>
    </footer>

    <script>
        // El id se toma desde el query string de la URL (?id=).
        const parametros = new URLSearchParams(window.location.search);
        const idAlumno = parametros.get('id');

        async function cargarItem() {
            const contenedor = document.getElementById('contenedor-item');

            if (!idAlumno) {
                contenedor.innerHTML = '<p class="mensaje-error">No se indicó un id de alumno.</p>';
                return;
            }

            try {
                // Se construye el endpoint desde el front con el parámetro recibido.
                const respuesta = await fetch(`/alumnos/${idAlumno}`);

                if (respuesta.status === 401) {
                    window.location.href = '/login';
                    return;
                }

                if (respuesta.status === 404) {
                    contenedor.innerHTML = '<p class="mensaje-error">Alumno no encontrado.</p>';
                    return;
                }

                if (!respuesta.ok) {
                    throw new Error('No se pudo cargar el alumno.');
                }

                const alumno = await respuesta.json();

                contenedor.innerHTML = `
                    <div class="tarjeta">
                        <p><strong>ID:</strong> ${alumno.id}</p>
                        <p><strong>Nombre:</strong> ${alumno.nombre} ${alumno.apellido}</p>
                        <p><strong>Grado:</strong> ${alumno.grado}</p>
                        <p><strong>Asistencia:</strong> ${alumno.asistencia}%</p>
                    </div>
                `;
            } catch (error) {
                contenedor.innerHTML = `<p class="mensaje-error">${error.message}</p>`;
            }
        }

        cargarItem();
    </script>
</body>
</html>
